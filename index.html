<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAMAL IPTV MOBILE</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --primary: #f0b90b; --bg: #05080a; --sidebar: #0d1117; --border: #1f2937; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        
        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 45px; height: 45px; border-radius: 50%; border-left-color: var(--primary); animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .main-container { display: flex; flex-direction: column; height: 100vh; padding: 12px; justify-content: flex-start; align-items: center; }
        
        /* 📱 چاکسازی لە هێڵی زانیاری شووشەیی بۆ ئەوەی دەقەکان تێکنەچن */
        .phone-style-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 16px;
            margin-bottom: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            gap: 8px;
        }
        
        .phone-time-section { display: flex; flex-direction: column; align-items: flex-start; flex: 1; min-width: 0; }
        .phone-clock { font-size: 1.1rem; font-weight: bold; color: #ffffff; line-height: 1.2; }
        .phone-date { font-size: 0.62rem; color: rgba(255, 255, 255, 0.7); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* فراوانکردنی بەشی کەشوهەوا بۆ هۆستکردنی ناوی درێژی وەک هەڵبژە */
        .phone-weather-section { 
            display: flex; 
            align-items: center; 
            gap: 5px; 
            background: rgba(0, 0, 0, 0.35); 
            padding: 4px 8px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            flex-shrink: 0;
            max-width: 55%;
            transition: opacity 0.4s ease-in-out;
        }
        .phone-temp { font-size: 0.95rem; font-weight: bold; color: var(--primary); white-space: nowrap; }
        .phone-city-details { display: flex; flex-direction: column; font-size: 0.62rem; text-align: right; min-width: 0; }
        .phone-city-details div { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .phone-gregorian-date { color: rgba(240, 185, 11, 0.85); font-size: 0.62rem; white-space: nowrap; }

        video { width: 100%; aspect-ratio: 16/9; border-radius: 12px; border: 1px solid var(--border); background: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        
        .mobile-controls { display: flex; gap: 10px; width: 100%; margin: 12px 0; }
        .mobile-btn { flex: 1; background: linear-gradient(145deg, #111720, #0d1117); border: 1px solid var(--border); color: #fff; padding: 14px; font-weight: bold; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.9rem; transition: 0.1s; }
        .mobile-btn:active { background: var(--primary); color: #000; border-color: var(--primary); }

        .bottom-sheet { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 65vh; 
            background: #090d13; z-index: 999; border-radius: 24px 24px 0 0; 
            border-top: 2px solid var(--border); transform: translateY(100%); 
            transition: transform 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94);
            display: flex; flex-direction: column; box-shadow: 0 -10px 30px rgba(0,0,0,0.7);
        }
        .bottom-sheet.open { transform: translateY(0); }
        
        .sheet-header { padding: 16px; font-size: 1rem; font-weight: bold; color: var(--primary); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .sheet-close { background: rgba(255,255,255,0.05); border: none; color: #ff4444; font-size: 1.1rem; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .sheet-content { flex: 1; overflow-y: auto; padding: 12px; }
        
        .group-btn { width: 100%; padding: 14px; background: rgba(255,255,255,0.04); border: none; color: #ccc; cursor: pointer; text-align: right; border-radius: 8px; margin-bottom: 6px; font-size: 0.9rem; }
        .group-btn.active-group { background: var(--primary) !important; color: black !important; font-weight: bold; }

        .chan-card { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(255,255,255,0.04); border-radius: 10px; cursor: pointer; margin-bottom: 6px; }
        .chan-card img { width: 38px; height: 38px; object-fit: contain; background: white; border-radius: 6px; }
        .chan-card span { font-size: 0.9rem; }
        .chan-card.active-channel { background: linear-gradient(90deg, rgba(240,185,11,0.2), rgba(240,185,11,0.05)) !important; border-right: 4px solid var(--primary); color: var(--primary) !important; font-weight: bold; }
        
        .epg-info { font-size: 0.8rem; color: #aaa; background: rgba(255, 255, 255, 0.04); padding: 8px; border-radius: 8px; display: none; width: 100%; text-align: center; border: 1px solid rgba(255,255,255,0.02); }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 990; backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); }
        .overlay.show { display: block; }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <h2 style="color:var(--primary); margin-top:16px; font-size: 1.3rem;">KAMAL PRO MOBILE</h2>
    <p id="loadingStatus" style="font-size:0.75rem; color:#999;">کەمێک چاوەڕێ بکە بۆ بارکردنی کەناڵەکان...</p>
</div>

<div class="overlay" id="screenOverlay" onclick="closeSheets()"></div>

<div class="main-container">
    
    <div class="phone-style-bar">
        <div class="phone-time-section">
            <div id="pClock" class="phone-clock">00:00:00</div>
            <div id="pDates" class="phone-date">بار دەکات...</div>
        </div>
        
        <div id="pWeatherBox" class="phone-weather-section">
            <span id="pIcon" style="font-size: 1rem;">☀️</span>
            <div class="phone-city-details">
                <div><span id="pCity" style="font-weight: bold; color: #fff;">هەولێر</span> • <span id="pDesc" style="color: rgba(255,255,255,0.6); font-size: 0.58rem;">Clear</span></div>
                <span id="pGregorian" class="phone-gregorian-date">بار دەکات...</span>
            </div>
            <span id="pTemp" class="phone-temp">--°C</span>
        </div>
    </div>

    <video id="player" controls autoplay playsinline></video>
    <div id="title" style="margin: 10px 0; color:var(--primary); font-weight:bold; font-size:1.05rem; text-align:center;">KAMAL PRO ULTRA</div>
    <div id="epgDisplay" class="epg-info"></div>

    <div class="mobile-controls">
        <button class="mobile-btn" onclick="openSheet('groups')">📁 گرووپەکان</button>
        <button class="mobile-btn" onclick="openSheet('channels')">📺 کەناڵەکان</button>
    </div>
</div>

<div class="bottom-sheet" id="sheetGroups">
    <div class="sheet-header">
        <span>📁 هەڵبژاردنی گرووپ</span>
        <button class="sheet-close" onclick="closeSheets()">✕</button>
    </div>
    <div class="sheet-content" id="gList"></div>
</div>

<div class="bottom-sheet" id="sheetChannels">
    <div class="sheet-header">
        <span>📺 لیستی کەناڵەکان</span>
        <button class="sheet-close" onclick="closeSheets()">✕</button>
    </div>
    <div class="sheet-content" id="cList"></div>
</div>

<script>
    const M3U_URL = "https://xtream-ie.net/get.php?username=iptv2026&password=iptv2026&type=m3u_plus";
    const EPG_URL = "https://xtream-ie.net/xmltv.php?username=iptv2026&password=iptv2026";
    
    let allData = [];
    let epgData = {};
    const video = document.getElementById('player');
    let hls = new Hls();
    let currentActiveUrl = "";

    const kurdistanCities = [
        { name: "هەولێر", lat: 36.1911, lon: 44.0092 },
        { name: "سلێمانی", lat: 35.5612, lon: 45.4385 },
        { name: "دهۆک", lat: 36.8601, lon: 42.9891 },
        { name: "کەرکووک", lat: 35.4681, lon: 44.3922 },
        { name: "هەڵەبجە", lat: 35.1778, lon: 45.9861 }
    ];

    const weatherCodes = {
        0: { text: 'Clear', icon: '☀️' }, 1: { text: 'Clear', icon: '🌤️' },
        2: { text: 'Cloudy', icon: '⛅' }, 3: { text: 'Cloudy', icon: '☁️' },
        45: { text: 'Foggy', icon: '🌫️' }, 48: { text: 'Foggy', icon: '🌫️' },
        51: { text: 'Drizzle', icon: '🌦️' }, 53: { text: 'Drizzle', icon: '🌦️' },
        55: { text: 'Drizzle', icon: '🌧️' }, 61: { text: 'Rain', icon: '🌧️' },
        63: { text: 'Rain', icon: '🌧️' }, 65: { text: 'Heavy Rain', icon: '⛈️' },
        71: { text: 'Snow', icon: '🌨️' }, 73: { text: 'Snow', icon: '❄️' },
        75: { text: 'Snow', icon: '❄️' }, 80: { text: 'Showers', icon: '🌦️' },
        81: { text: 'Showers', icon: '🌧️' }, 82: { text: 'Heavy Showers', icon: '⛈️' },
        95: { text: 'Storm', icon: '⛈️' }
    };

    let cachedWeather = {};
    let currentCityIndex = 0;

    window.onload = function() {
        startLoading();
        fetchLiveWeather().then(() => showMiniWeather(0));
        setInterval(fetchLiveWeather, 300000);
        updateUiDateTime();
        setInterval(updateUiDateTime, 1000);
        setInterval(cycleWeather, 5000);
    };

    function openSheet(type) {
        closeSheets();
        document.getElementById('screenOverlay').classList.add('show');
        if(type === 'groups') document.getElementById('sheetGroups').classList.add('open');
        if(type === 'channels') document.getElementById('sheetChannels').classList.add('open');
    }

    function closeSheets() {
        document.getElementById('sheetGroups').classList.remove('open');
        document.getElementById('sheetChannels').classList.remove('open');
        document.getElementById('screenOverlay').classList.remove('show');
    }

    async function fetchLiveWeather() {
        for (let i = 0; i < kurdistanCities.length; i++) {
            const city = kurdistanCities[i];
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current=temperature_2m,weather_code&timezone=Asia/Baghdad`);
                if(res.ok) {
                    const data = await res.json();
                    const info = weatherCodes[data.current.weather_code] || { text: 'Clear', icon: '☀️' };
                    cachedWeather[i] = { name: city.name, temp: `${Math.round(data.current.temperature_2m)}°C`, desc: info.text, icon: info.icon };
                }
            } catch(e) { console.log("Weather error"); }
        }
    }

    function showMiniWeather(index) {
        const data = cachedWeather[index];
        if(!data) return;
        document.getElementById('pCity').innerText = data.name;
        document.getElementById('pTemp').innerText = data.temp;
        document.getElementById('pDesc').innerText = data.desc;
        document.getElementById('pIcon').innerText = data.icon;
    }

    function cycleWeather() {
        const el = document.getElementById('pWeatherBox');
        if(!el) return;
        el.style.opacity = 0;
        setTimeout(() => {
            currentCityIndex = (currentCityIndex + 1) % kurdistanCities.length;
            showMiniWeather(currentCityIndex);
            el.style.opacity = 1;
        }, 400);
    }

    function getKurdishDate(date) {
        const kurdishMonths = ["خاکەلێوە", "بانەمەڕ", "جۆزەردان", "پوشپەڕ", "گەلاوێژ", "خەرمانان", "ڕەزبەر", "گەڵاڕێزان", "سەرماوەز", "بەفرانبار", "ڕێبەندان", "ڕەشەمە"];
        try {
            const PersianFormatter = new Intl.DateTimeFormat('en-US-u-ca-persian', { day: 'numeric', month: 'numeric', year: 'numeric' });
            const parts = PersianFormatter.format(date).split('/');
            let kYear = parseInt(parts[2]) + 1321; 
            return `${parseInt(parts[1])}ی ${kurdishMonths[parseInt(parts[0]) - 1]}ی ${kYear}`;
        } catch (e) { return "٥ی جۆزەردانی ٢٧٢٦"; }
    }

    function getGregorianDateStr(date) {
        const months = ["کانوونی دووەم", "شوبات", "ئازار", "نیسان", "ئایار", "حوزەیران", "تەممووز", "ئاب", "ئەیلوول", "تشرینی یەکەم", "تشرینی دووەم", "کانوونی یەکەم"];
        return `${date.getDate()}ی ${months[date.getMonth()]}ی ${date.getFullYear()}`;
    }

    function updateUiDateTime() {
        const now = new Date();
        document.getElementById('pClock').innerText = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
        
        let hijriStr = "";
        try {
            hijriStr = new Intl.DateTimeFormat('ar-SA', { calendar: 'islamic-umalqura', day: 'numeric', month: 'long', year: 'numeric' }).format(now).replace('هـ', 'کۆچی');
        } catch (e) { hijriStr = "٨ ذو الحجة ١٤٤٧ کۆچی"; }

        document.getElementById('pDates').innerText = `${hijriStr} ❖ ${getKurdishDate(now)}`;
        document.getElementById('pGregorian').innerText = getGregorianDateStr(now);
    }

    async function startLoading() {
        try {
            const r = await fetch(M3U_URL);
            const d = await r.text();
            parseM3U(d);
            fetchEPG();
            document.getElementById('loadingOverlay').style.display = 'none';
        } catch(e) { 
            document.getElementById('loadingStatus').innerHTML = "<span style='color:red;'>خەتا لە لۆدکردنی بەستەرەکە!</span>";
        }
    }

    async function fetchEPG() {
        try {
            const res = await fetch(EPG_URL);
            const text = await res.text();
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(text, "text/xml");
            const programmes = xmlDoc.getElementsByTagName("programme");
            
            for (let i = 0; i < programmes.length; i++) {
                const prog = programmes[i];
                const channelId = prog.getAttribute("channel");
                const title = prog.getElementsByTagName("title")[0]?.textContent || "";
                if (!epgData[channelId]) epgData[channelId] = [];
                epgData[channelId].push({ title });
            }
        } catch (e) { console.log("EPG block"); }
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        let obj = {}; allData = []; 
        lines.forEach(l => {
            if(l.startsWith('#EXTINF:')) {
                obj.name = l.split(',')[1] || "Channel";
                const g = l.match(/group-title="([^"]+)"/i);
                const i = l.match(/tvg-logo="([^"]+)"/i);
                const cid = l.match(/tvg-id="([^"]+)"/i);
                obj.group = g ? g[1] : "General";
                obj.logo = i ? i[1] : "";
                obj.id = cid ? cid[1] : "";
            } else if(l.startsWith('http')) {
                obj.url = l.trim(); allData.push(obj); obj = {};
            }
        });
        renderG();
        if(allData.length > 0) filter("هەمووی", null);
    }

    function renderG() {
        const gs = ["هەمووی", ...new Set(allData.map(x => x.group))];
        document.getElementById('gList').innerHTML = gs.map(g => `<button class="group-btn" onclick="filter('${g}', this)">${g}</button>`).join('');
    }

    function renderC(list) {
        document.getElementById('cList').innerHTML = list.map(x => {
            const img = (x.logo) ? x.logo : `https://ui-avatars.com/api/?name=${encodeURIComponent(x.name)}&background=f0b90b&color=000&bold=true`;
            const isActive = (x.url === currentActiveUrl) ? 'active-channel' : '';
            return `<div class="chan-card ${isActive}" onclick="play('${x.url}', '${x.name}', '${x.id}', this)"><img src="${img}"><span>${x.name}</span></div>`;
        }).join('');
    }

    function play(u, n, id, element) {
        currentActiveUrl = u;
        document.getElementById('title').innerText = n;
        document.querySelectorAll('.chan-card').forEach(c => c.classList.remove('active-channel'));
        if(element) element.classList.add('active-channel');

        const epgDisplay = document.getElementById('epgDisplay');
        if(id && epgData[id] && epgData[id].length > 0) {
            epgDisplay.innerText = `ئێستا پێشکەش دەکرێت: ${epgData[id][0].title}`;
            epgDisplay.style.display = "block";
        } else {
            epgDisplay.style.display = "none";
        }

        if(Hls.isSupported()) { 
            hls.destroy(); hls = new Hls(); hls.loadSource(u); hls.attachMedia(video); 
            hls.on(Hls.Events.MANIFEST_PARSED,()=>video.play()); 
        }
        else if (video.canPlayType('application/vnd.apple.mpegurl')) { video.src = u; video.play(); }
        
        closeSheets();
    }

    function filter(g, btnElement) {
        document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active-group'));
        if(btnElement) btnElement.classList.add('active-group');
        renderC(g === "هەمووی" ? allData : allData.filter(x => x.group === g));
        
        if(btnElement) {
            openSheet('channels');
        }
    }
</script>
</body>
</html>
